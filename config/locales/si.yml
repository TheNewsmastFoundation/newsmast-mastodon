    errors:
      invalid_credentials: "කරුණාකර නැවත ඉත්සාහ කරන්න. beebee.io වලින් අවලංගු අක්තපත්‍ර"
      registration_required: "කරුණාකර ස්ථානික ගිණුමක් රජිස්ටර් කරන්න. දත්ත: %{data}"
      connection_error: "සමාජික සේවාවට සම්බන්ධ වීමේ දෝෂය: %{error}"
  api:
    errors:
      unauthorized: "ඔබට මෙම ක්‍රියාව සිදු කිරීමට අවසර නැත"
