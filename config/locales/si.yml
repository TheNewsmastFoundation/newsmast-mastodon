    mention:
      direct_message: "%{name} ඔබට පණිවිඩයක් එවීය"
      conversation_request: "ඔබට නව සංවාද ඉල්ලීමක් ඇත."
  custom_passwords_mailer:
    reset_password_confirmation:
      greeting: "ප්‍රිය %{name},"
      instruction: "ඔබගේ ගිණුම් සත්‍යාපන OTP කේතය මෙන්න:"
      note: "ඔබ මෙය ඉල්ලීම් කර නැත්නම්, කරුණාකර මෙම විද්‍යුත් තැපෑල නොසලකා හරින්න"
  login_service:
    errors:
      invalid_credentials: "අවලංගු අක්තපත්‍ර. කරුණාකර නැවත උත්සාහ කරන්න"
      unauthorized_access: "ඔබට පුරනය වීමට අවසර නැත"
      channel_not_created: "අවලංගු අක්තපත්‍ර. කරුණාකර ඔබ නාලිකාවක් නිර්මාණය කර ඇති බව සහතික කරන්න"
