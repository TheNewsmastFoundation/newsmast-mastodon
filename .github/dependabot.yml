version: 2
updates:
- package-ecosystem: bundler
  directory: "/"
  schedule:
    interval: weekly
    day: monday
    time: "05:00"
  open-pull-requests-limit: 5
  groups:
    ruby-minor-and-patch:
      update-types:
      - minor
      - patch
- package-ecosystem: github-actions
  directory: "/"
  schedule:
    interval: weekly
    day: monday
    time: "05:15"
  open-pull-requests-limit: 5
  groups:
    actions-minor-and-patch:
      update-types:
      - minor
      - patch
