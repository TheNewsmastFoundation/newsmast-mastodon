name: Publish to RubyGems

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      attestations: write
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Ensure tag matches gem version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          GEM_VERSION="$(ruby -e 'require_relative "lib/newsmast_mastodon/version"; print NewsmastMastodon::VERSION')"

          if [ "$TAG_VERSION" != "$GEM_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match gem version ($GEM_VERSION)."
            exit 1
          fi

      - name: Run test suite
        run: bundle exec rspec

      - name: Run linter
        run: bundle exec rubocop

      - name: Build gem
        run: bundle exec rake build

      - name: Generate release checksums
        run: |
          sha256sum pkg/*.gem > pkg/SHA256SUMS

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            pkg/*.gem
            pkg/SHA256SUMS

      - name: Release to RubyGems
        uses: rubygems/release-gem@v1
