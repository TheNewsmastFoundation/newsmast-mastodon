name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby: ["3.1", "3.2", "3.3"]
    env:
      RUBOCOP_CACHE_ROOT: tmp/rubocop
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Ruby ${{ matrix.ruby }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      - name: Prepare RuboCop cache
        uses: actions/cache@v4
        env:
          DEPENDENCIES_HASH: ${{ hashFiles('**/.rubocop.yml', '**/.rubocop_todo.yml', 'Gemfile.lock') }}
        with:
          path: ${{ env.RUBOCOP_CACHE_ROOT }}
          key: rubocop-${{ runner.os }}-${{ matrix.ruby }}-${{ env.DEPENDENCIES_HASH }}-${{ github.ref_name == github.event.repository.default_branch && github.run_id || 'default' }}
          restore-keys: |
            rubocop-${{ runner.os }}-${{ matrix.ruby }}-${{ env.DEPENDENCIES_HASH }}-

      - name: Lint code for consistent style
        run: bundle exec rubocop --format github

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby: ["3.1", "3.2", "3.3"]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: newsmast_mastodon_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: valkey/valkey:8
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      RAILS_ENV: test
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/newsmast_mastodon_test
      REDIS_URL: redis://localhost:6379/0

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Ruby ${{ matrix.ruby }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      - name: Run specs
        run: bundle exec rspec --format documentation

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-ruby-${{ matrix.ruby }}
          path: coverage
          if-no-files-found: ignore

      - name: Keep screenshots from failed system tests
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: screenshots-ruby-${{ matrix.ruby }}
          path: ${{ github.workspace }}/tmp/screenshots
          if-no-files-found: ignore

  # Upgrade-safety gates. These are static checks (no DB/services needed) that
  # protect every Mastodon upgrade cycle — see docs/internal/mastodon-upgrade/RUNBOOK.md.
  compatibility:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Migration idempotency + version sync gates
        run: bundle exec rspec spec/compatibility --format documentation

  # Boots the gem against a real host Mastodon checkout (MASTODON_ROOT mode) and
  # checks vendored frontend/view overrides for upstream drift. Opt-in: only
  # runs when the repo variable HOST_MASTODON_REPO is configured (e.g.
  # "patchwork-hub/patchwork-mastodon"), since it needs the private host repo.
  host-integration:
    runs-on: ubuntu-latest
    if: ${{ vars.HOST_MASTODON_REPO != '' }}
    steps:
      - name: Checkout gem
        uses: actions/checkout@v5
        with:
          path: gem

      - name: Checkout host Mastodon
        uses: actions/checkout@v5
        with:
          repository: ${{ vars.HOST_MASTODON_REPO }}
          ref: ${{ vars.HOST_MASTODON_REF || '' }}
          token: ${{ secrets.HOST_MASTODON_TOKEN }}
          path: host

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Check vendored override drift
        working-directory: gem
        run: ruby bin/check-override-drift "${GITHUB_WORKSPACE}/host"

      - name: Install gem dependencies
        working-directory: gem
        run: bundle install

      - name: Run gem specs against host Mastodon
        working-directory: gem
        env:
          MASTODON_ROOT: ${{ github.workspace }}/host
        run: bundle exec rspec --format documentation

